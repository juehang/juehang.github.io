<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  {{insert style.html}}
  <title>Tag: {{fill fd_tag}}</title>
</head>
<body>
<div class="starfield"></div>
{{insert nav.html}}
    <h1>Tag: {{fill fd_tag}}</h1>
    {{taglist}}
  </main>
</div>
<footer class="ed-footer">
  <div class="left">
    <span><a href="https://creativecommons.org/licenses/by/4.0/">CC BY 4.0</a> · {{ fill author }}</span>
  </div>
  <div class="right">
    <span class="social">
      <a href="https://orcid.org/0000-0001-8228-8949" aria-label="ORCID"><img src="/assets/orcid.svg" alt="ORCID"></a>
      <a href="https://fediscience.org/@qinjuehang" rel="me" aria-label="Mastodon"><img src="/assets/mastodon.svg" alt="Mastodon"></a>
      <a href="https://github.com/juehang/" rel="me" aria-label="GitHub"><img src="/assets/github.svg" alt="GitHub"></a>
    </span>
    <span>Built with <a href="https://github.com/tlienart/Franklin.jl">Franklin.jl</a> · <a href="https://julialang.org">Julia</a></span>
  </div>
</footer>
</body>
</html>
